      <!-- Tracking DIFERIDO (GA + Meta Pixel): cargan cuando el navegador está ocioso.
           Eran ~388KB de terceros que competían por ancho de banda/CPU en la carga inicial.
           Se cargan vía requestIdleCallback (no atado a la interacción, para no trabar el
           primer tap); el PageView se registra igual, unos segundos más tarde. -->
      <script>
        (function () {
          var loaded = false;
          function loadTracking() {
            if (loaded) return; loaded = true;
            // Google Analytics
            var ga = document.createElement('script');
            ga.async = true;
            ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-7FEV504KNB';
            document.head.appendChild(ga);
            window.dataLayer = window.dataLayer || [];
            function gtag(){ dataLayer.push(arguments); }
            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', 'G-7FEV504KNB');
            // Meta Pixel
            !function(f,b,e,v,n,t,s)
            {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)}(window, document,'script',
            'https://connect.facebook.net/en_US/fbevents.js');
            fbq('init', '2187028668714954');
            fbq('track', 'PageView');
          }
          // Cargar cuando el navegador esté OCIOSO, NO atado a la interacción del usuario.
          // (Antes se disparaba en el primer tap → el primer toque, ej. abrir el menú, se
          //  trababa al cargar ~100KB de tracking en ese instante.) requestIdleCallback no
          // existe en Safari < 16.4 → fallback a setTimeout.
          if ('requestIdleCallback' in window) { requestIdleCallback(loadTracking, { timeout: 3500 }); }
          else { setTimeout(loadTracking, 2500); }
        })();
      </script>
